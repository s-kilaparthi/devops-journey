apiVersion: apps/v1
kind: Deployment
metadata:
  name: karthik-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: karthik-app
  template:
    metadata:
      labels:
        app: karthik-app
    spec:
      containers:
      - name: karthik-nginx
        image: skilaparthi/karthik-nginx:production
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
---
apiVersion: v1
kind: Service
metadata:
  name: karthik-service
spec:
  type: NodePort
  selector:
    app: karthik-app
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: production
  APP_PORT: "80"
