apiVersion: v1
kind: Pod
metadata:
  name: karthik-pod
spec:
  containers:
  - name: karthik-container
    image: skilaparthi/karthik-nginx:production
    env:
    - name: APP_ENV
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_ENV
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_PASSWORD
