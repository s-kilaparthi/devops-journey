name: Deploy to EC2

on:
  push:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest week5/day3/app/test_app.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set environment
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -t skilaparthi/karthik-nginx:${{ env.ENVIRONMENT }} ./week3/day2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u skilaparthi --password-stdin

      - name: Push to Docker Hub
        run: docker push skilaparthi/karthik-nginx:${{ env.ENVIRONMENT }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull skilaparthi/karthik-nginx:${{ env.ENVIRONMENT }}
            docker stop $(docker ps -q) || true
            docker run -d -p 80:80 skilaparthi/karthik-nginx:${{ env.ENVIRONMENT }}
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Check Actions tab for details!"
