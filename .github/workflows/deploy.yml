name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t skilaparthi/karthik-nginx ./week3/day2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u skilaparthi --password-stdin

      - name: Push to Docker Hub
        run: docker push skilaparthi/karthik-nginx:latest
