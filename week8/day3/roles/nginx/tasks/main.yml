---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Deploy webpage from template
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify: Restart nginx
